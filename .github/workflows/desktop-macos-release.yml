name: Desktop macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-14
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      GAPPD_ENABLE_NOTARIZATION: '1'
      GAPPD_REQUIRE_GATEKEEPER: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate release secrets
        run: |
          test -n "$APPLE_CERTIFICATE_P12_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Write signing certificate
        run: |
          CERT_PATH="$RUNNER_TEMP/gappd-macos-signing.p12"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert = os.environ['APPLE_CERTIFICATE_P12_BASE64']
          Path(os.environ['RUNNER_TEMP'], 'gappd-macos-signing.p12').write_bytes(base64.b64decode(cert))
          PY
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}

      - name: Preflight signing identity
        run: |
          CERT_PATH="$RUNNER_TEMP/gappd-macos-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/gappd-macos-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          if ! security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$APPLE_SIGNING_IDENTITY" >/dev/null; then
            echo "Expected signing identity not found in imported certificate: $APPLE_SIGNING_IDENTITY" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2 || true
            exit 1
          fi

          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Download Go modules
        run: go mod download

      - name: Install desktop dependencies
        run: npm ci
        working-directory: desktop

      - name: Build release artifacts
        run: npm run dist
        working-directory: desktop

      - name: Verify notarized app bundle
        run: npm run verify:mac-release
        working-directory: desktop

      - name: Verify release artifacts exist
        run: |
          shopt -s nullglob
          app_paths=(desktop/release/mac*/Gappd.app)
          dmg_paths=(desktop/release/*.dmg)

          if [ ${#app_paths[@]} -eq 0 ]; then
            echo "No packaged app found at desktop/release/mac*/Gappd.app" >&2
            exit 1
          fi

          if [ ${#dmg_paths[@]} -eq 0 ]; then
            echo "No DMG found at desktop/release/*.dmg" >&2
            exit 1
          fi

          printf 'Found app bundle: %s\n' "${app_paths[@]}"
          printf 'Found DMG: %s\n' "${dmg_paths[@]}"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gappd-desktop-macos
          if-no-files-found: error
          path: |
            desktop/release/*.dmg
            desktop/release/mac*/**
