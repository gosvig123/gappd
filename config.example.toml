# gappd configuration — local-first by default
# Copy to ~/.gappd/config.toml and edit values.

# Path to the SQLite database file
db_path = "~/.gappd/db.sqlite"

[ai]
# AI provider. Currently supported: "ollama"
provider = "ollama"
# Ollama model name
model = "llama3.1:8b"
# Ollama HTTP endpoint
endpoint = "http://localhost:11434"
temperature = 0.3
